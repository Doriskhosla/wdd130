<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact us for reservations, questions, or feedback">
    <meta name="author" content="Maria D. Khosla">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>


    <!--HEADER-->

    <header class="site-header">
        <div class="logo">
            <img src="images/rapidslogo.jpg" alt="Rafting Company Logo" class="Logo">
        </div>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>

        </nav>
    </header>


    <!--CONTACT SECTION-->
    <main class="contact-main">
        <!--TITLE / CONTACT INFO-->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>234 Jefferson Cv</p>
            <p>Rapid City, UT</p>
            <p>(801) 300 8591</p>
            <p>info@Raftingwater.com</p>
        </section>

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3747.352290329854!2d-100.82827091231619!3d20.07755511795465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775197110031!5m2!1sen!2sus"
          width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>


        <!--FORM-->
        <form class="contact-form">
            <label>Name</label>
            <input type="text" placeholder="Placeholder">

            <label></label>Email</label>
            <input type="email" placeholder="Placeholder">

            <label>Message purpose</label>
            <div class="radio-group">
                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>
            </div>

            <label>Message</label>
            <textarea placeholder="Type here"></textarea>

            <label class="checkbox">
                <input type="checkbox"> Please Subscribe me to the monthly newsletter
            </label>

            <button type="submit">Get in Touch!</button>
        </form>


        <!--Employee Profiles-->
        <h2>Meet Our Team</h2>
        <section class="employees">

            <figure>
                <img src="images/employee1.jpg" alt=" Employee 1 - River Guide">
                <figcaption> Robert Huntington - Operation Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt=" Employee 2 - Manager">
                <figcaption>Luis David - Whitewater Guide </figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt=" Mary Cierra 3- Instructor">
                <figcaption>Mary Cierra- Safety Instructor</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Co. | Maria D. Khosla</p>


        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" width="50" height="50" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" width="50" height="50" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" width="50" height="50" alt="Instagram Icon">
            </a>
        </nav>

    </footer>
</body>

</html>

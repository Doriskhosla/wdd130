<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact us for reservations, questions, or feedback">
    <meta name="author" content="Maria D. Khosla">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header class="site-header">
        <img src="images/rapidslogo.jpg" alt="Rafting Company Logo" class="Logo">
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>

        <!--Company-->
        <section class="contact-info">
            <h2>Company Information</h2>
            <p><strong>Address:</strong> 234 Jefferson Cv, Rapids City, UT</p>
            <p><strong>Phone:</strong>(801) 300 8591</p>
            <p><strong>Email:</strong>info@Raftingwater.com</p>

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3747.352290329854!2d-100.82827091231619!3d20.07755511795465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775197110031!5m2!1sen!2sus"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>

            <!--Employee Profiles-->
            <section class="employees">
                <h2>Meet Our Team</h2>

                <figure>
                    <img src="images/employee1.jpg" alt="Robert Huntington - River Guide">
                    <figcaption> Robert Huntington - Led River Guide</figcaption>
                </figure>

                <figure>
                    <img src="image/employee2.jpg" alt="Luis David - Manager">
                    <figcaption>Luis David - Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="image/employee3.jpg" alt="Mary Cazier- Instructor">
                    <figcaption>Mary Cazier- Safety Instructor</figcaption>
                </figure>
                <!--Contact Form-->
                <section class="contact-form">
                    <h2>Send Us a Message</h2>

                    <form action="#" method="post">

                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>


                        <p>Purpose of Message</p>
                        <label><input type="radio" name="purpose" value="general" required> General
                            Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation">
                            Question</label>
                        <label><input type="radio" name="purpose" value="suggestion"> Webside
                            Suggestion</label>


                        <label for="message"></label>
                        <textarea id="message" name="message" required></textarea>

                        <label>
                            <input type="checkbox" name="subscribe">
                            please subscribe me to the monthly newsletter</label>

                        <button type="submit">Send Message</button>
                    </form>

                </section>
    </main>


    <p>&copy; 2026 White Water Rafting Co. | Maria D. Khosla</p>


    <nav class="socialmedia">
        <a href="https://facebook.com">
            <img src="images/facebook.png" width="50" height="50" alt="Facebook Icon">
        </a>
        <a href="https://linkedin.com">
            <img src="images/linkedin.png" width="50" height="50" alt="Linkedin Icon">
        </a>
        <a href="https://instagram.com">
            <img src="images/instagram.png" width="50" height="50" alt="Instagram Icon">
        </a>
    </nav>
    </footer>

</body>

</html>
